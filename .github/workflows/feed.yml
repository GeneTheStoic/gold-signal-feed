name: Publish gold signal feed
on:
  schedule:
    # 23:30 UTC daily, after the US options close has settled.
    - cron: '30 23 * * *'
  workflow_dispatch:        # lets you run it manually from the Actions tab
permissions:
  contents: write           # allows the workflow to commit the feed file
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install yfinance pandas numpy
      - name: Run publisher
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
        run: python feed_publisher_v3.py
      - name: Commit feed if it changed
        run: |
          git config user.name  "feed-bot"
          git config user.email "feed-bot@users.noreply.github.com"
          git add feed/gold_signal.csv
          if git diff --cached --quiet; then
            echo "No feed change."
          else
            git commit -m "feed $(date -u +%Y-%m-%d)"
            git push
          fi
